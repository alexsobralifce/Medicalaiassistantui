services:
  postgres:
    image: postgres:15-alpine
    container_name: medassist_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medassist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medassist_pass}
      POSTGRES_DB: ${POSTGRES_DB:-medassist_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medassist_user} -d ${POSTGRES_DB:-medassist_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
